<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  html, body {
    background: #0a0604;
    margin: 0; padding: 0;
    overflow: hidden;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; scrollbar-width: none; }
  *::-webkit-scrollbar { display: none; }

  /* ── SCROLL CONTAINER ── */
  #scrollContainer {
    position: fixed;
    inset: 0;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
    /* Smoother on mobile */
    will-change: scroll-position;
  }

  /* ── SITE SECTION 1 — Landing ── */
  .site {
    scroll-snap-align: start;
    scroll-snap-stop: always;
    min-height: 100vh;
    height: 100vh;
    overflow: hidden;
    font-family: 'Courier New', Courier, monospace;
    color: #fff;
    display: flex;
    flex-direction: column;
    position: relative;
    background-color: #0a0604;
    opacity: 0;
    transition: opacity 1.0s ease;
  }
  .site.visible { opacity: 1; }

  .bg-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 30%;
    z-index: 0;
  }
  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(0,0,0,0.38) 0%,
      rgba(0,0,0,0.10) 40%,
      rgba(0,0,0,0.10) 60%,
      rgba(0,0,0,0.52) 100%
    );
    z-index: 1;
  }
  .overlay-center {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 60% 30% at 50% 72%, rgba(0,0,0,0.45) 0%, transparent 100%);
    z-index: 2;
  }
  .flicker {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 28% 32% at 22% 38%, rgba(255,80,10,0.15) 0%, transparent 70%);
    z-index: 3; pointer-events: none;
  }
  .flicker-right {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 22% 28% at 78% 55%, rgba(255,70,5,0.11) 0%, transparent 70%);
    z-index: 3; pointer-events: none;
  }
  .sky-drift {
    position: absolute; top: 0; left: 0; right: 0; height: 55%;
    background: radial-gradient(ellipse 60% 80% at 70% 20%, rgba(20,5,40,0.18) 0%, transparent 70%);
    z-index: 3; pointer-events: none;
    animation: skyDrift 18s ease-in-out infinite alternate;
  }
  @keyframes skyDrift {
    from { transform: translateX(0px) scale(1); opacity: 0.6; }
    to   { transform: translateX(30px) scale(1.04); opacity: 1; }
  }

  /* ── DESKTOP NAV ── */
  nav {
    display: flex;
    justify-content: space-between;
    padding: 26px 32px 0;
    position: relative;
    z-index: 20;
  }
  .nav-logo {
    font-size: 15px;
    font-weight: 900;
    font-family: 'Arial Black', Arial, sans-serif;
    line-height: 1;
    text-transform: lowercase;
    letter-spacing: -0.01em;
  }
  .nav-logo em { font-style: italic; }
  .nav-links, .nav-center { display: flex; flex-direction: column; gap: 3px; }
  .nav-links a, .nav-center a {
    color: #fff; text-decoration: none;
    font-size: 10.5px; letter-spacing: 0.1em;
  }
  .nav-menu-btn {
    display: none;
    background: none;
    border: 1px solid rgba(255,255,255,0.5);
    color: #fff;
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    padding: 7px 14px;
    cursor: pointer;
    text-transform: uppercase;
  }
  .spacer { flex: 1; }

  /* ── SCROLL HINT ── */
  .scroll-hint {
    position: absolute;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    opacity: 0;
    transition: opacity 1s ease;
    pointer-events: none;
  }
  .scroll-hint.visible { opacity: 1; }
  .scroll-hint span {
    font-family: 'Courier New', monospace;
    font-size: 8px;
    letter-spacing: 0.22em;
    color: rgba(255,255,255,0.45);
    text-transform: uppercase;
  }
  .scroll-hint-line {
    width: 1px;
    height: 32px;
    background: rgba(255,255,255,0.25);
    position: relative;
    overflow: hidden;
  }
  .scroll-hint-line::after {
    content: '';
    position: absolute;
    top: -100%;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(255,255,255,0.8);
    animation: scrollDrop 1.8s ease-in-out infinite;
  }
  @keyframes scrollDrop {
    0% { top: -100%; }
    100% { top: 100%; }
  }

  /* ── BLACK BACKDROP ── */
  #loadScreen {
    position: fixed;
    inset: 0;
    background: #0a0604;
    z-index: 150;
    opacity: 1;
    transition: opacity 0.9s ease;
    pointer-events: none;
  }
  #loadScreen.hide { opacity: 0; }

  /* ── ASCII WRAP ── */
  .ascii-wrap {
    position: fixed;
    left: 50%;
    bottom: 8%;
    transform: translateX(-50%);
    z-index: 210;
    cursor: crosshair;
    pointer-events: none;
  }

  #asciiOut {
    display: block;
    font-size: 8.6px;
    line-height: 1.13;
    letter-spacing: 0.06em;
    white-space: pre;
    color: #ffffff;
    font-family: 'Courier New', Courier, monospace;
    user-select: none;
    text-shadow:
      0 0 6px rgba(255,255,255,1),
      0 0 14px rgba(255,255,255,1),
      0 0 28px rgba(255,255,255,0.9),
      0 0 50px rgba(255,255,255,0.6);
  }

  /* ── LOADING UI ── */
  #loadUi {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    white-space: nowrap;
    opacity: 1;
    transition: opacity 0.5s ease;
    pointer-events: none;
    z-index: 211;
  }
  #loadUi.hide { opacity: 0; }

  #loadLine1 {
    font-family: 'Courier New', monospace;
    color: #fff;
    letter-spacing: 0.18em;
    text-align: center;
    text-transform: uppercase;
    opacity: 0.9;
    font-size: 9px;
    margin-bottom: 10px;
    text-shadow: 0 0 8px rgba(255,255,255,0.9), 0 0 20px rgba(255,255,255,0.5);
  }
  .load-bar-wrap {
    width: 140px;
    height: 1px;
    background: rgba(255,255,255,0.25);
    position: relative;
    overflow: hidden;
  }
  .load-bar {
    position: absolute;
    left: 0; top: 0; height: 100%;
    width: 0%;
    background: rgba(255,255,255,1);
    transition: width 0.05s linear;
    box-shadow: 0 0 6px rgba(255,255,255,0.8);

  /* ── MOBILE FULL-SCREEN MENU ── */
  .menu-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(6,3,1,0.97);
    z-index: 100;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    padding: 60px 40px;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .menu-overlay.open { display: flex; opacity: 1; }
  .menu-overlay a {
    color: #fff;
    text-decoration: none;
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: 36px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: -0.01em;
    line-height: 1.3;
    opacity: 0.9;
  }
  .menu-overlay a + a { margin-top: 8px; }
  .menu-overlay .menu-sub {
    margin-top: 40px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .menu-overlay .menu-sub a {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.15em;
    opacity: 0.45;
  }
  .menu-close {
    position: absolute;
    top: 26px; right: 24px;
    background: none;
    border: 1px solid rgba(255,255,255,0.4);
    color: #fff;
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    padding: 7px 14px;
    cursor: pointer;
    text-transform: uppercase;
  }

  /* ══════════════════════════════════════
     ── VIDEO SECTION ──
  ══════════════════════════════════════ */
  .video-section {
    scroll-snap-align: start;
    scroll-snap-stop: always;
    height: 100vh;
    width: 100%;
    position: relative;
    background: #000;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* The actual video */
  #showreel {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Pixel canvas sits on top of video, pointer events so it captures mouse */
  #pixelCanvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 2;
    pointer-events: none;

  /* Subtle dark vignette over video */
  .video-vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 90% 90% at 50% 50%, transparent 50%, rgba(0,0,0,0.55) 100%);
    z-index: 3;
    pointer-events: none;
  }

  /* Top-left label: SHOWREEL — 2025 */
  .video-label-tl {
    position: absolute;
    top: 28px;
    left: 32px;
    z-index: 10;
    font-family: 'Courier New', monospace;
    font-size: 9px;
    letter-spacing: 0.22em;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    pointer-events: none;
  }

  /* Top-right label */
  .video-label-tr {
    position: absolute;
    top: 28px;
    right: 32px;
    z-index: 10;
    font-family: 'Courier New', monospace;
    font-size: 9px;
    letter-spacing: 0.22em;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    pointer-events: none;
  }

  /* Bottom progress bar */
  .video-progress-wrap {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: rgba(255,255,255,0.1);
    z-index: 10;
  }
  .video-progress-bar {
    height: 100%;
    width: 0%;
    background: rgba(255,255,255,0.7);
    transition: width 0.1s linear;
    box-shadow: 0 0 8px rgba(255,255,255,0.4);
  }

  /* Bottom-left: time counter */
  .video-time {
    position: absolute;
    bottom: 18px;
    left: 32px;
    z-index: 10;
    font-family: 'Courier New', monospace;
    font-size: 9px;
    letter-spacing: 0.18em;
    color: rgba(255,255,255,0.35);
    pointer-events: none;
  }

  /* Bottom-right: ANDRÉ LARSEN */
  .video-name {
    position: absolute;
    bottom: 18px;
    right: 32px;
    z-index: 10;
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: 10px;
    font-weight: 900;
    letter-spacing: 0.08em;
    color: rgba(255,255,255,0.25);
    text-transform: lowercase;
    pointer-events: none;
  }
  .video-name em { font-style: italic; }

  /* ── MOBILE ── */
  @media (max-width: 768px) {
    nav {
      padding: 22px 20px 0;
      align-items: center;
      justify-content: flex-end;
    }
    .nav-logo { display: none; }
    .nav-links, .nav-center { display: none; }
    .nav-menu-btn { display: block; }

    .ascii-wrap {
      bottom: auto;
      top: 53%;
      left: 50%;
      transform: translate(-50%, -50%);
      transform-origin: center center;
    }

    /* Mobile: show full video, no crop */
    #showreel { object-fit: contain; background: #000; }
    .video-vignette { display: none; }

    /* Softer snap on mobile */
    #scrollContainer { scroll-snap-type: y proximity; }

    .video-label-tl, .video-label-tr { font-size: 8px; letter-spacing: 0.14em; }
    .video-label-tl { left: 16px; top: 20px; }
    .video-label-tr { right: 16px; top: 20px; }
    .video-time { left: 16px; bottom: 14px; }
    .video-name { right: 16px; bottom: 14px; font-size: 9px; }
  }
</style>

<script>
/* ── MENU TOGGLE ── */
const menuBtn     = document.getElementById('menuBtn');
const menuOverlay = document.getElementById('menuOverlay');
const menuClose   = document.getElementById('menuClose');
menuBtn.addEventListener('click', () => menuOverlay.classList.add('open'));
menuClose.addEventListener('click', () => menuOverlay.classList.remove('open'));

/* ── SHARED CONSTANTS ── */
const isMobile = window.innerWidth <= 768;
const CHARS    = '@#FRT43%=+-.';
const COLS     = isMobile ? 140 : 195;
const ROWS     = isMobile ? 36  : 48;
const CHAR_W   = isMobile ? 6   : 7;
const CHAR_H   = isMobile ? 9   : 10;
const FONT_S   = isMobile ? 100 : 96;
const NAME     = 'André Larsen';

function rand(x, y, s) {
  const v = Math.sin(x * 127.1 + y * 311.7 + s) * 43758.5453;
  return v - Math.floor(v);
}

/* ── BUILD CANVAS ── */
const canvas = document.createElement('canvas');
canvas.width  = COLS * CHAR_W;
canvas.height = ROWS * CHAR_H;
const ctx = canvas.getContext('2d');
ctx.font = `900 italic ${FONT_S}px Arial Black, Arial, sans-serif`;
ctx.fillStyle = '#fff';
ctx.textBaseline = 'middle';
const tw = ctx.measureText(NAME).width;
ctx.fillText(NAME, (canvas.width - tw) / 2, canvas.height / 2);
const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;

const cellOffset = new Float32Array(COLS * ROWS);
const cellSpeed  = new Float32Array(COLS * ROWS);
for (let i = 0; i < COLS * ROWS; i++) {
  cellOffset[i] = Math.random() * 100;
  cellSpeed[i]  = 0.5 + Math.random() * 1.0;
}

/* ── ASCII RENDER ── */
function renderAscii(targetEl, t, mouseCol, mouseRow) {
  const breath    = 0.5 + 0.5 * Math.sin(t * 0.018);
  const threshold = 30 + breath * 40;
  const REPEL_RADIUS = (mouseCol !== -999 && !isMobile) ? 14 : 0;
  const parts = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      let srcCol = c, srcRow = r;
      if (REPEL_RADIUS > 0) {
        const dx = c - mouseCol;
        const dy = (r - mouseRow) * 2.2;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < REPEL_RADIUS && dist > 0.5) {
          const force = Math.pow((REPEL_RADIUS - dist) / REPEL_RADIUS, 1.4);
          srcCol = c - (dx / dist) * force * REPEL_RADIUS * 0.85;
          srcRow = r - ((r - mouseRow) / dist) * force * REPEL_RADIUS * 0.85;
        }
      }
      const px = Math.floor(srcCol * CHAR_W + CHAR_W / 2);
      const py = Math.floor(srcRow * CHAR_H + CHAR_H / 2);
      const inB  = px >= 0 && py >= 0 && px < canvas.width && py < canvas.height;
      const alpha = inB ? imgData[(py * canvas.width + px) * 4 + 3] : 0;
      if (alpha < threshold) { parts.push(' '); continue; }
      const idx = Math.floor(rand(srcCol, srcRow, Math.floor(t * cellSpeed[r * COLS + c] + cellOffset[r * COLS + c])) * CHARS.length);
      parts.push(CHARS[Math.max(0, Math.min(CHARS.length - 1, idx))]);
    }
    parts.push('\n');
  }
  targetEl.textContent = parts.join('');
}

/* ── GLITCH TEXT ── */
const GLITCH_CHARS_LOAD = '@#FRT43%=+-.<>!?/\\|~^&*0123456789';
function glitchLine(el, finalText, startDelay) {
  const scrambled = Array.from(finalText).map(c =>
    (c === ' ' || c === ':' || c === '/') ? c :
    GLITCH_CHARS_LOAD[Math.floor(Math.random() * GLITCH_CHARS_LOAD.length)]
  );
  el.textContent = scrambled.join('');
  let i = 0;
  setTimeout(() => {
    const iv = setInterval(() => {
      if (i < finalText.length) {
        for (let j = i; j < finalText.length; j++) {
          const c = finalText[j];
          if (c !== ' ' && c !== ':' && c !== '/')
            scrambled[j] = GLITCH_CHARS_LOAD[Math.floor(Math.random() * GLITCH_CHARS_LOAD.length)];
        }
        scrambled[i] = finalText[i];
        el.textContent = scrambled.join('');
        i++;
      } else { el.textContent = finalText; clearInterval(iv); }
    }, 40);
  }, startDelay);
}

const loadLine1  = document.getElementById('loadLine1');
const loadBar    = document.getElementById('loadBar');
const loadUi     = document.getElementById('loadUi');
const loadScreen = document.getElementById('loadScreen');
const site       = document.getElementById('site');
const scrollHint = document.getElementById('scrollHint');

glitchLine(loadLine1, ':/ INITIALISING', 100);

let progress = 0;
const loadInterval = setInterval(() => {
  progress += 1.4 + Math.random() * 2;
  if (progress >= 100) { progress = 100; clearInterval(loadInterval); }
  loadBar.style.width = progress + '%';
}, 28);

setTimeout(() => {
  loadUi.classList.add('hide');
  loadScreen.classList.add('hide');
  setTimeout(() => {
    site.classList.add('visible');
    setTimeout(() => {
      loadScreen.remove();
      // Show scroll hint after landing is visible
      setTimeout(() => scrollHint.classList.add('visible'), 800);
    }, 1200);
  }, 500);
}, 2400);

/* ── POSITION loadUi just above the visible ascii letters ── */
function positionLoadUi() {
  const rect = asciiEl.getBoundingClientRect();
  const visualTop = rect.top + rect.height * 0.32;
  loadUi.style.top = (visualTop - loadUi.offsetHeight - 8) + 'px';
}

const asciiEl = document.getElementById('asciiOut');
const area    = document.getElementById('area');

if (isMobile) {
  asciiEl.style.fontSize      = '4.8px';
  asciiEl.style.lineHeight    = '1.10';
  asciiEl.style.letterSpacing = '0.04em';
}

function scaleAscii() {
  if (!isMobile) return;
  const screenW = window.innerWidth;
  const w = asciiEl.scrollWidth;
  if (w > 0) {
    const scale = (screenW * 0.90) / w;
    area.style.transform = `translate(-50%, -50%) scale(${scale})`;
    area.style.transformOrigin = 'center center';
  }
}

/* Hide ASCII when scrolled to video section */
const scrollContainer = document.getElementById('scrollContainer');
scrollContainer.addEventListener('scroll', () => {
  const scrolled = scrollContainer.scrollTop;
  const vh = window.innerHeight;
  const ratio = scrolled / vh; // 0 = landing, 1 = video
  area.style.opacity = Math.max(0, 1 - ratio * 3).toString();
  scrollHint.style.opacity = Math.max(0, 1 - ratio * 5).toString();
});

let mouseCol = -999, mouseRow = -999;
area.addEventListener('mousemove', e => {
  const rect = asciiEl.getBoundingClientRect();
  mouseCol = (e.clientX - rect.left) / (rect.width / COLS);
  mouseRow = (e.clientY - rect.top)  / (rect.height / ROWS);
});
area.addEventListener('mouseleave', () => { mouseCol = -999; mouseRow = -999; });

let t = 0;
let scaled = false;
let uiPositioned = false;
function frame() {
  renderAscii(asciiEl, t, mouseCol, mouseRow);
  if (!scaled) { scaleAscii(); scaled = true; }
  if (!uiPositioned && asciiEl.getBoundingClientRect().height > 0) {
    positionLoadUi();
    uiPositioned = true;
  }
  t += 0.05;
  requestAnimationFrame(frame);
}
frame();

/* ── NAV GLITCH INTRO ── */
const GLITCH_CHARS = '@#FRT43%=+-.<>!?/\\|~^&*0123456789';
const logo = document.querySelector('.nav-logo');
if (logo) {
  let blinks = 0;
  const blinkInterval = setInterval(() => {
    logo.style.opacity = logo.style.opacity === '0' ? '1' : '0';
    blinks++;
    if (blinks >= 4) { clearInterval(blinkInterval); logo.style.opacity = '1'; }
  }, 130);
}

function typewriterGlitch(el, delay) {
  const final = el.textContent;
  const scrambled = Array.from(final).map(c =>
    (c === ' ' || c === '\n') ? c : GLITCH_CHARS[Math.floor(Math.random() * GLITCH_CHARS.length)]
  );
  el.textContent = scrambled.join('');
  let i = 0;
  setTimeout(() => {
    const interval = setInterval(() => {
      if (i < final.length) {
        for (let j = i; j < final.length; j++) {
          if (final[j] !== ' ') scrambled[j] = GLITCH_CHARS[Math.floor(Math.random() * GLITCH_CHARS.length)];
        }
        scrambled[i] = final[i];
        el.textContent = scrambled.join('');
        i++;
      } else { el.textContent = final; clearInterval(interval); }
    }, 38);
  }, delay);
}

document.querySelectorAll('.nav-links a, .nav-center a').forEach((el, i) => {
  typewriterGlitch(el, 1500 + i * 100);
});

/* ── FILM GRAIN ── */
const grainCanvas = document.getElementById('grainCanvas');
const grainCtx = grainCanvas.getContext('2d');
function resizeGrain() { grainCanvas.width = window.innerWidth; grainCanvas.height = window.innerHeight; }
resizeGrain(); window.addEventListener('resize', resizeGrain);
function drawGrain() {
  const w = grainCanvas.width, h = grainCanvas.height;
  const imageData = grainCtx.createImageData(w, h);
  const data = imageData.data;
  for (let i = 0; i < data.length; i += 4) {
    const v = Math.random() > 0.45 ? Math.floor(Math.random() * 120) : 0;
    data[i] = data[i+1] = data[i+2] = v;
    data[i+3] = v > 0 ? 85 : 0;
  }
  grainCtx.putImageData(imageData, 0, 0);
}
setInterval(drawGrain, 42);

/* ── LAVA EMBER PARTICLES ── */
const partCanvas = document.getElementById('particleCanvas');
const partCtx = partCanvas.getContext('2d');
function resizePart() { partCanvas.width = window.innerWidth; partCanvas.height = window.innerHeight; }
resizePart(); window.addEventListener('resize', resizePart);
const embers = Array.from({ length: 13 }, () => spawnEmber());
function spawnEmber() {
  const w = partCanvas.width, h = partCanvas.height;
  return {
    x: w * Math.random(), y: h * (0.58 + Math.random() * 0.38),
    size: 0.7 + Math.random() * 1.2, speedY: 0.12 + Math.random() * 0.28,
    speedX: (Math.random() - 0.5) * 0.18, life: Math.random(),
    maxLife: 0.7 + Math.random() * 0.5, hue: 12 + Math.random() * 18
  };
}
function drawParticles() {
  partCtx.clearRect(0, 0, partCanvas.width, partCanvas.height);
  for (let e of embers) {
    e.y -= e.speedY; e.x += e.speedX; e.life += 0.0025;
    const prog = e.life / e.maxLife;
    const alpha = prog < 0.2 ? prog / 0.2 : 1 - ((prog - 0.2) / 0.8);
    if (alpha <= 0 || e.life >= e.maxLife) { Object.assign(e, spawnEmber()); continue; }
    partCtx.beginPath();
    partCtx.arc(e.x, e.y, e.size, 0, Math.PI * 2);
    partCtx.fillStyle = `hsla(${e.hue}, 100%, 58%, ${alpha * 0.7})`;
    partCtx.fill();
  }
  requestAnimationFrame(drawParticles);
}
drawParticles();

/* ── VOLCANO LIGHT FLICKER ── */
const flicker = document.getElementById('flicker');
const flickerRight = document.getElementById('flickerRight');
let flickerTarget = 0.13, flickerCurrent = 0.13;
let flickerRTarget = 0.11, flickerRCurrent = 0.11;
function animateFlicker() {
  if (Math.random() < 0.04) flickerTarget  = 0.04 + Math.random() * 0.22;
  if (Math.random() < 0.03) flickerRTarget = 0.03 + Math.random() * 0.18;
  flickerCurrent  += (flickerTarget  - flickerCurrent)  * 0.06;
  flickerRCurrent += (flickerRTarget - flickerRCurrent) * 0.05;
  flicker.style.opacity      = flickerCurrent  / 0.13;
  flickerRight.style.opacity = flickerRCurrent / 0.11;
  requestAnimationFrame(animateFlicker);
}
animateFlicker();

/* ══════════════════════════════════════
   ── VIDEO PIXEL HOVER EFFECT ──
   Desktop only. Reads video frames,
   pixelates a radius around the cursor.
══════════════════════════════════════ */
if (!isMobile) {
  const video      = document.getElementById('showreel');
  const pxCanvas   = document.getElementById('pixelCanvas');
  const pxCtx      = pxCanvas.getContext('2d');

  let vMouseX = -999, vMouseY = -999;
  const videoSection = document.getElementById('videoSection');

  function resizePixelCanvas() {
    pxCanvas.width  = window.innerWidth;
    pxCanvas.height = window.innerHeight;
  }
  resizePixelCanvas();
  window.addEventListener('resize', resizePixelCanvas);

  videoSection.addEventListener('mousemove', e => {
    const rect = videoSection.getBoundingClientRect();
    vMouseX = e.clientX - rect.left;
    vMouseY = e.clientY - rect.top;
    pxCanvas.style.pointerEvents = 'none';
  });
  videoSection.addEventListener('mouseleave', () => {
    vMouseX = -999;
    vMouseY = -999;
  });

  // Off-screen canvas to sample video frames
  const sampleCanvas = document.createElement('canvas');
  const sampleCtx    = sampleCanvas.getContext('2d');
  const SAMPLE_W = 320, SAMPLE_H = 180; // low-res sample for performance
  sampleCanvas.width  = SAMPLE_W;
  sampleCanvas.height = SAMPLE_H;

  const PIXEL_SIZE   = 18;  // size of each pixel block
  const EFFECT_RADIUS = 130; // px radius of effect

  function drawPixelEffect() {
    pxCtx.clearRect(0, 0, pxCanvas.width, pxCanvas.height);

    if (vMouseX === -999 || video.readyState < 2) {
      requestAnimationFrame(drawPixelEffect);
      return;
    }

    // Draw current video frame to sample canvas
    sampleCtx.drawImage(video, 0, 0, SAMPLE_W, SAMPLE_H);
    const frameData = sampleCtx.getImageData(0, 0, SAMPLE_W, SAMPLE_H);

    const W = pxCanvas.width;
    const H = pxCanvas.height;

    // Scale factor from pixel canvas to sample canvas
    const scaleX = SAMPLE_W / W;
    const scaleY = SAMPLE_H / H;

    // Draw pixelated blocks in radius around mouse
    const startX = Math.floor((vMouseX - EFFECT_RADIUS) / PIXEL_SIZE) * PIXEL_SIZE;
    const startY = Math.floor((vMouseY - EFFECT_RADIUS) / PIXEL_SIZE) * PIXEL_SIZE;
    const endX   = vMouseX + EFFECT_RADIUS;
    const endY   = vMouseY + EFFECT_RADIUS;

    for (let bx = startX; bx < endX; bx += PIXEL_SIZE) {
      for (let by = startY; by < endY; by += PIXEL_SIZE) {
        const cx = bx + PIXEL_SIZE / 2;
        const cy = by + PIXEL_SIZE / 2;
        const dx = cx - vMouseX;
        const dy = cy - vMouseY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > EFFECT_RADIUS) continue;

        // Fade at edges of effect
        const strength = 1 - dist / EFFECT_RADIUS;
        const alpha = Math.pow(strength, 0.6);

        // Sample color from video frame
        const sx = Math.floor(cx * scaleX);
        const sy = Math.floor(cy * scaleY);
        const clampedSx = Math.max(0, Math.min(SAMPLE_W - 1, sx));
        const clampedSy = Math.max(0, Math.min(SAMPLE_H - 1, sy));
        const idx = (clampedSy * SAMPLE_W + clampedSx) * 4;
        const r = frameData.data[idx];
        const g = frameData.data[idx + 1];
        const b = frameData.data[idx + 2];

        pxCtx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
        pxCtx.fillRect(bx, by, PIXEL_SIZE - 1, PIXEL_SIZE - 1);
      }
    }

    // Draw a subtle crosshair at cursor center
    pxCtx.strokeStyle = `rgba(255,255,255,0.25)`;
    pxCtx.lineWidth = 0.5;
    pxCtx.beginPath();
    pxCtx.moveTo(vMouseX - 12, vMouseY);
    pxCtx.lineTo(vMouseX + 12, vMouseY);
    pxCtx.moveTo(vMouseX, vMouseY - 12);
    pxCtx.lineTo(vMouseX, vMouseY + 12);
    pxCtx.stroke();

    requestAnimationFrame(drawPixelEffect);
  }
  drawPixelEffect();
}

/* ── VIDEO PROGRESS BAR + TIME ── */
const videoEl      = document.getElementById('showreel');
const progressBar  = document.getElementById('videoProgressBar');
const videoTime    = document.getElementById('videoTime');

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

videoEl.addEventListener('timeupdate', () => {
  if (!videoEl.duration) return;
  const pct = (videoEl.currentTime / videoEl.duration) * 100;
  progressBar.style.width = pct + '%';
  videoTime.textContent = formatTime(videoEl.currentTime);
});
